# 1. THE NAME: How your pipeline shows up on your GitHub dashboard
name: HTML Validation CI

# 2. THE TRIGGER: What events make this pipeline start running automatically?
on:
  push:
    branches: [ main, master ]  # Run every time code is pushed to main/master
  pull_request:
    branches: [ main, master ]  # Run every time a pull request is opened

# 3. THE WORK: The actual environments and sequences of actions
jobs:
  validate-frontend:
    runs-on: ubuntu-latest     # Spin up a brand new, clean Linux cloud server

    # 4. THE STEPS: The linear checklist of instructions the server executes
    steps:
    - name: Check out repository code
      uses: actions/checkout@v4  # Step A: Copy your code files into the cloud server

    - name: Set up Node.js Environment
      uses: actions/setup-node@v4 # Step B: Download and install Node.js on that server
      with:
        node-version: '18'

    - name: Install Testing Dependencies
      run: npm install           # Step C: Read your package.json and install htmlhint

    - name: Run HTML Validation Scan
      run: npm test              # Step D: Execute the "htmlhint clone.html" scanner